<p-toast position="top-right"></p-toast>

<div *ngIf="loading" class="d-flex justify-content-center align-items-center" style="height:200px;">
  <div class="spinner-border" style="color:var(--primary-color);"></div>
</div>

<ng-container *ngIf="!loading">

  <div class="admin-page-header">
    <h2>
      <i class="bi" [class.bi-plus-circle]="isNew" [class.bi-pencil-square]="!isNew"></i>
      {{ isNew ? 'Nouveau produit' : 'Modifier — ' + ref }}
    </h2>
    <div class="d-flex gap-2">
      <a routerLink="/produits" class="btn-app btn-app--surface">
        <i class="bi bi-arrow-left"></i> Retour
      </a>
      <button class="btn-app btn-app--primary" (click)="save()" [disabled]="saving">
        <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
        <i *ngIf="!saving" class="bi bi-check-lg"></i>
        {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </div>

  <!-- Section 1: Identité -->
  <div class="form-section">
    <div class="form-section-header"><i class="bi bi-fingerprint"></i> Identité</div>
    <div class="form-section-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Référence *</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.refProduit"
                 [readonly]="!isNew" placeholder="ex: KB-HUI-001"
                 style="font-family:monospace; border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Classe</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.classe"
                 placeholder="ex: Huile d'olive"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">État</label>
          <select class="form-select form-select-sm" [(ngModel)]="model.etatObjet"
                  style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
            <option value="code-1">Actif</option>
            <option value="code-2">Inactif</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Section 2: Désignations -->
  <div class="form-section">
    <div class="form-section-header"><i class="bi bi-translate"></i> Désignation & Slogan</div>
    <div class="form-section-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Désignation FR</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.designation.fr"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Désignation AR</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.designation.ar" dir="rtl"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Désignation EN</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.designation.en"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Slogan FR</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.slogan.fr"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Slogan AR</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.slogan.ar" dir="rtl"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Slogan EN</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="model.slogan.en"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
      </div>
    </div>
  </div>

  <!-- Section 3: Description -->
  <div class="form-section">
    <div class="form-section-header"><i class="bi bi-card-text"></i> Description</div>
    <div class="form-section-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Description FR</label>
          <textarea class="form-control form-control-sm" [(ngModel)]="model.description.fr" rows="4"
                    style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);"></textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Description AR</label>
          <textarea class="form-control form-control-sm" [(ngModel)]="model.description.ar" rows="4" dir="rtl"
                    style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);"></textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Description EN</label>
          <textarea class="form-control form-control-sm" [(ngModel)]="model.description.en" rows="4"
                    style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Section 4: Prix & Stock -->
  <div class="form-section">
    <div class="form-section-header"><i class="bi bi-currency-dollar"></i> Prix & Stock</div>
    <div class="form-section-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Prix HT (MAD)</label>
          <input type="number" class="form-control form-control-sm" [(ngModel)]="model.prixHT" min="0" step="0.01"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold" style="font-size:.82rem;">TVA (%)</label>
          <input type="number" class="form-control form-control-sm" [(ngModel)]="model.tva" min="0" max="100"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Stock</label>
          <input type="number" class="form-control form-control-sm" [(ngModel)]="model.stock" min="0"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-3">
          <div class="p-2 rounded text-center" style="background:rgba(51,51,5,.08); border:1px solid var(--surface-border);">
            <div style="font-size:.72rem; color:var(--text-secondary-color); font-weight:600;">PRIX TTC</div>
            <div style="font-size:1.25rem; font-weight:800; color:var(--primary-color);">{{ prixTTC | number:'1.2-2' }} MAD</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Section 5: Tags & Régions -->
  <div class="form-section">
    <div class="form-section-header"><i class="bi bi-geo-alt"></i> Tags, Régions & Certifications</div>
    <div class="form-section-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Tags <small class="fw-normal text-muted">(virgule séparés)</small></label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="tagsInput"
                 placeholder="bio, premium, artisanal"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Régions <small class="fw-normal text-muted">(virgule séparés)</small></label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="regionsInput"
                 placeholder="Souss-Massa, Marrakech"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" style="font-size:.82rem;">Certifications</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="certificationsInput"
                 placeholder="IGP, AOP, Label Maroc"
                 style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
        </div>
      </div>
    </div>
  </div>

  <!-- Section 6: Caractéristiques -->
  <div class="form-section">
    <div class="form-section-header">
      <i class="bi bi-list-check"></i> Caractéristiques
      <button type="button" class="btn btn-sm btn-outline-primary ms-auto" style="font-size:.75rem; padding:2px 10px;" (click)="addCaracKey()">
        <i class="bi bi-plus"></i> Ajouter
      </button>
    </div>
    <div class="form-section-body">
      <div *ngIf="caracKeys.length === 0" class="text-center py-3" style="color:var(--text-secondary-color); font-size:.84rem;">
        <i class="bi bi-info-circle me-1"></i> Aucune caractéristique. Cliquez sur "Ajouter".
      </div>
      <div class="row g-2">
        <div class="col-md-4" *ngFor="let k of caracKeys">
          <div class="input-group input-group-sm">
            <span class="input-group-text" style="background:var(--surface-hover); border-color:var(--surface-border); font-size:.78rem; max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" [title]="k">
              {{ k }}
            </span>
            <input type="text" class="form-control" [(ngModel)]="model.caracteristiques[k]"
                   style="border-color:var(--surface-border); background:var(--surface-card); color:var(--text-color);">
            <button class="btn btn-outline-danger" type="button" style="padding:0 8px;" (click)="removeCaracKey(k)">
              <i class="bi bi-x"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-3 mb-4">
    <a routerLink="/produits" class="btn-app btn-app--surface">Annuler</a>
    <button class="btn-app btn-app--primary" (click)="save()" [disabled]="saving">
      <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
      <i *ngIf="!saving" class="bi bi-check-lg"></i>
      {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
  </div>

</ng-container>
