<div class="app-card" (click)="navigate()" *ngIf="produit">
  <div class="app-card-img-wrapper">
    <img [src]="imageUrl" [alt]="fr.designationProduit || produit.refProduit"
         class="app-card-img-top"
         (error)="$any($event.target).src='http://localhost:4000/images/product.jpg'">
    <span class="app-badge top-0 start-0 m-2">{{ produit.refProduit }}</span>
  </div>

  <div class="card-body p-3 d-flex flex-column gap-2">
    <div class="d-flex justify-content-between align-items-start gap-2">
      <h6 class="app-title mb-0 truncate truncate-2 flex-1">{{ fr.designationProduit || produit.refProduit }}</h6>
      <span class="badge-stock" [ngClass]="stockClass" style="white-space:nowrap; flex-shrink:0;">{{ stockLabel }}</span>
    </div>

    <p class="app-text mb-0 truncate truncate-2" *ngIf="fr.slogan">{{ fr.slogan }}</p>

    <div class="d-flex justify-content-between align-items-center mt-auto pt-1">
      <div class="price-ttc">
        {{ priceTTC | number:'1.2-2' }}
        <span class="price-label">MAD TTC</span>
      </div>
      <button class="btn-app btn-app--primary btn-app--sm" (click)="navigate(); $event.stopPropagation()">
        <i class="pi pi-eye"></i> Voir
      </button>
    </div>
  </div>
</div>
