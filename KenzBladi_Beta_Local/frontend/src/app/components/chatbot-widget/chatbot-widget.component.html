<!-- FAB toggle button -->
<button class="chatbot-fab" (click)="toggle()" [title]="isOpen ? 'Fermer' : 'Parler à Kenza'">
  <span *ngIf="!isOpen">🧿</span>
  <i *ngIf="isOpen" class="pi pi-times"></i>
</button>

<!-- Chat panel -->
<div class="chatbot-panel" *ngIf="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <span class="chat-avatar">🧿</span>
    <div>
      <div class="chat-name">Kenza</div>
      <div class="chat-status">Assistante Kenz Bladi</div>
    </div>
    <button class="btn-close-chat" (click)="close()">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <ng-container *ngFor="let msg of messages">
      <div class="chat-bubble" [ngClass]="msg.role">
        <ng-container *ngIf="msg.role === 'assistant'">
          <div class="agent-badge" *ngIf="agentLabel(msg.agent)">{{ agentLabel(msg.agent) }}</div>
        </ng-container>
        <span style="white-space: pre-wrap;">{{ msg.content }}</span>
      </div>
    </ng-container>

    <!-- Typing indicator -->
    <div class="chat-bubble assistant" *ngIf="isLoading">
      <div class="d-flex gap-1 align-items-center" style="padding: 4px 0;">
        <span class="typing-dot"></span>
        <span class="typing-dot" style="animation-delay:.2s"></span>
        <span class="typing-dot" style="animation-delay:.4s"></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <input
      type="text"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      placeholder="Posez votre question…"
      [disabled]="isLoading"
      autocomplete="off">
    <button (click)="send()" [disabled]="isLoading || !inputText.trim()">
      <i class="pi pi-send"></i>
    </button>
  </div>
</div>

<style>
  .typing-dot {
    width: 7px; height: 7px;
    background: var(--text-secondary-color);
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1s infinite;
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
